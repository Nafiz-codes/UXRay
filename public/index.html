<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <h1>UXRay</h1>
    <p>
    AI-powered UI/UX Repair Agent
    </p>

  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 1400px;
      margin: 20px auto;
      padding: 20px;
    }

    h1 {
      margin-bottom: 20px;
    }

    textarea {
      width: 100%;
      height: 180px;
      margin-bottom: 15px;
      padding: 10px;
      font-family: monospace;
    }

    button {
      padding: 12px 24px;
      cursor: pointer;
      font-size: 16px;
      margin-bottom: 20px;
    }

    .preview-container {
      display: flex;
      gap: 20px;
      margin-top: 20px;
    }

    .preview-box {
      flex: 1;
    }

    iframe {
      width: 100%;
      height: 400px;
      border: 1px solid #ccc;
      background: white;
    }

    #status {
      margin: 10px 0;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <h3>Paste HTML</h3>

  <textarea id="htmlInput">
<button style="background:red;color:red">
Submit
</button>
  </textarea>

  <h3>Repair Instruction</h3>

  <textarea id="instructionInput">Make this modern and accessible</textarea>

  <button id="healBtn">
    Scan & Repair
  </button>

  <div id="status"></div>

  <h3>Returned HTML</h3>

  <textarea id="output"></textarea>

  <div class="preview-container">

    <div class="preview-box">
      <h3>Original</h3>
      <iframe id="originalFrame"></iframe>
    </div>

    <div class="preview-box">
      <h3>Improved</h3>
      <iframe id="previewFrame"></iframe>
    </div>

  </div>

  <script src="index.js"></script>

</body>
</html>
